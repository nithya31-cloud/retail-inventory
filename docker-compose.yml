version: "3.9"

services:
  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: retail_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-RetailDB@2024}
      MYSQL_DATABASE: retail_inventory_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python Analytics (run once at startup) ─────────────────
  analytics:
    build:
      context: ./python-analytics
      dockerfile: Dockerfile
    container_name: retail_analytics
    volumes:
      - analytics_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python generate_dataset.py && python analytics_engine.py"

  # ── Node.js Backend API ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retail_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-RetailDB@2024}
      DB_NAME: retail_inventory_db
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-strong-32-char-secret}
      ANALYTICS_DATA_DIR: /app/analytics_data
    volumes:
      - analytics_data:/app/analytics_data:ro
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      analytics:
        condition: service_completed_successfully

  # ── React Frontend (Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retail_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  analytics_data:
